  <text x="32" y="316" fill="#58a6ff" font-weight="bold">THREAD STATISTICS</text>
  <line x1="32" y1="325" x2="848" y2="325" stroke="#21262d"/>
  <text x="32" y="349"><tspan fill="#8b949e">LB0 dispatched </tspan><tspan fill="#e6edf3">35</tspan><tspan fill="#8b949e">   LB1 dispatched </tspan><tspan fill="#e6edf3">42</tspan><tspan fill="#8b949e">      FP0 </tspan><tspan fill="#e6edf3">35</tspan><tspan fill="#8b949e">  FP1 </tspan><tspan fill="#e6edf3">0</tspan><tspan fill="#8b949e">  FP2 </tspan><tspan fill="#e6edf3">0</tspan><tspan fill="#8b949e">  FP3 </tspan><tspan fill="#e6edf3">42</tspan></text>

