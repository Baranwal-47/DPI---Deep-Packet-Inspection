  </g>
  <g>
    <text x="32" y="520" fill="#e6edf3">Facebook</text>
    <text x="180" y="520" fill="#8b949e"> 1    1.3%</text>
    <rect x="310" y="509" width="7" height="12" rx="3" fill="#f85149"/>
    <text x="330" y="520" fill="#f85149" font-weight="bold">&#10007; BLOCKED</text>
  </g>
  <text x="32" y="546" fill="#8b949e">+ 15 more: Netflix, Spotify, Discord, TikTok, Zoom, GitHub, Google, Telegram &#8230;</text>

