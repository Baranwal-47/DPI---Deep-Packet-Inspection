  <circle cx="64" cy="18" r="6" fill="#28c840"/>
  <text x="440" y="22" text-anchor="middle" fill="#8b949e" font-size="12">dpi_engine &#8212; terminal</text>

  <!-- prompt -->
  <text x="32" y="66"><tspan fill="#3fb950">&#10095;</tspan><tspan fill="#e6edf3"> dpi_engine test_dpi.pcap output.pcap </tspan><tspan fill="#d29922">--block-app YouTube --block-app Facebook</tspan></text>

