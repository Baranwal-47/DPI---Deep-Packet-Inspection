  <text x="32" y="276"><tspan fill="#8b949e">Total Packets </tspan><tspan fill="#e6edf3">77</tspan><tspan fill="#8b949e">     TCP </tspan><tspan fill="#e6edf3">73</tspan><tspan fill="#8b949e">  &#183;  UDP </tspan><tspan fill="#e6edf3">4</tspan><tspan fill="#8b949e">  &#183;  5,738 bytes</tspan></text>
